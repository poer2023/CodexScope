name: Bug report
description: Report a reproducible CodexScope problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please redact private Codex logs, account IDs, tokens, and local paths before posting.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: CodexScope version, release, or commit SHA.
      placeholder: "1.0.2 / main / commit SHA"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: dropdown
    id: run-mode
    attributes:
      label: How are you running CodexScope?
      options:
        - Installed app
        - Locally built app
        - pnpm tauri dev
        - Frontend-only preview
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include the smallest steps that reproduce the issue.
      placeholder: |
        1. Open CodexScope
        2. Switch to Week
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant errors or attach screenshots. Redact private data.
      render: text
    validations:
      required: false
